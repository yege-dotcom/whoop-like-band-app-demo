<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Whoop-like Band App Demo</title><style>:root{--bg:#070a0d;--card:#10161c;--card2:#151c23;--line:rgba(244,247,248,.1);--text:#f4f7f8;--muted:#7e8a94;--soft:#a7b1ba;--rec:#2fea7b;--sleep:#6ea8ff;--strain:#ffb84d;--stress:#ff5e6c;--coach:#4dd7ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,rgba(77,215,255,.08),transparent 34rem),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}button,input{font:inherit;color:inherit}.app{max-width:460px;min-height:100vh;margin:auto;background:linear-gradient(180deg,rgba(16,22,28,.82),rgba(7,10,13,.98) 24rem);box-shadow:0 24px 80px rgba(0,0,0,.38);overflow-x:hidden}.content{padding:18px 16px 96px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.ey{margin:0 0 3px;color:var(--muted);font-size:12px}.top h1{margin:0;font-size:21px}.chip{display:flex;align-items:center;gap:7px;min-width:116px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:rgba(21,28,35,.82);color:var(--soft);font-size:12px;white-space:nowrap}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 10px currentColor}.green{background:var(--rec);color:var(--rec)}.yellow{background:#ffd15c;color:#ffd15c}.blue{background:#60a5fa;color:#60a5fa}.red{background:var(--stress);color:var(--stress)}.grey{background:#8a8f98;color:#8a8f98;box-shadow:none}.scenes{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}.scenes::-webkit-scrollbar{display:none}.scene{flex:0 0 142px;min-height:58px;text-align:left;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.92);padding:9px 10px}.scene.on{border-color:rgba(77,215,255,.66);background:rgba(77,215,255,.1)}.date{display:block;color:var(--muted);font-size:11px}.name{display:block;margin-top:4px;font-size:13px;font-weight:680}.hero{padding:18px;border:1px solid rgba(47,234,123,.24);border-radius:8px;background:linear-gradient(145deg,rgba(47,234,123,.1),transparent 46%),var(--card)}.hero.recover{border-color:rgba(96,165,250,.3);background:linear-gradient(145deg,rgba(96,165,250,.13),transparent 48%),var(--card)}.hero.maintain{border-color:rgba(255,209,92,.28);background:linear-gradient(145deg,rgba(255,209,92,.12),transparent 48%),var(--card)}.heroTop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.lab{color:var(--muted);font-size:12px}.big{font-size:58px;line-height:.95;font-weight:780}.big span{font-size:21px;color:var(--soft)}.right{text-align:right}.pill{display:inline-flex;align-items:center;min-height:28px;padding:5px 9px;border-radius:999px;background:rgba(244,247,248,.08);font-size:12px;font-weight:700}.push{color:var(--rec)}.maintain{color:#ffd15c}.recover{color:#60a5fa}.copy{margin:14px 0 0;font-size:16px;line-height:1.45;font-weight:650}.sub{margin:6px 0 0;color:var(--soft);font-size:13px;line-height:1.45}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.card,.item,.msg,.dev{border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.92)}.card{min-height:112px;padding:12px}.card button{width:100%;border:0;background:transparent;padding:0;text-align:left}.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.val{margin-top:10px;font-size:28px;line-height:1;font-weight:760}.bar{height:4px;border-radius:999px;background:rgba(244,247,248,.1);overflow:hidden;margin-top:12px}.fill{width:calc(var(--v)*1%);height:100%;background:currentColor}.rec{color:var(--rec)}.sleep{color:var(--sleep)}.strain{color:var(--strain)}.stress{color:var(--stress)}.sec{margin-top:18px}.head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:9px}.head h2{margin:0;font-size:15px}.meta{color:var(--muted);font-size:12px}.reasons,.list{display:grid;gap:8px}.reason{display:grid;grid-template-columns:20px minmax(0,1fr);gap:8px;min-height:42px;padding:10px;border:1px solid var(--line);border-radius:8px;background:rgba(21,28,35,.72)}.idx{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:rgba(77,215,255,.13);color:var(--coach);font-size:11px;font-weight:750}.txt{font-size:13px;line-height:1.38;color:var(--soft)}.timeline{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.step{min-height:70px;padding:10px 8px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.72)}.time{color:var(--muted);font-size:11px}.step b{display:block;margin-top:8px;font-size:12px;line-height:1.25}.ins{padding:13px;border:1px solid rgba(77,215,255,.24);border-radius:8px;background:rgba(77,215,255,.08)}.ins b{color:var(--coach);font-size:12px}.ins p{margin:8px 0 0;color:var(--soft);font-size:13px;line-height:1.45}.tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;padding:4px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.88)}.tab{min-height:36px;border:0;border-radius:6px;background:transparent;color:var(--muted);font-size:12px}.tab.on{background:#1b232b;color:var(--text)}.metric{margin-top:14px;padding:16px;border:1px solid var(--line);border-radius:8px;background:var(--card)}.metricHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.metric h2{margin:0;font-size:18px}.ring{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at center,var(--card) 57%,transparent 58%),conic-gradient(currentColor calc(var(--v)*1%),rgba(244,247,248,.1) 0);color:var(--a)}.ring strong{font-size:24px}.tiles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-top:14px}.tile{min-height:74px;padding:10px;border:1px solid var(--line);border-radius:8px;background:rgba(21,28,35,.74)}.tile strong{display:block;margin-top:7px;font-size:18px}.tile small{display:block;margin-top:5px;color:var(--soft);font-size:11px}.stage{display:flex;height:18px;overflow:hidden;border-radius:999px;background:rgba(244,247,248,.1);margin:14px 0 8px}.sg{height:100%;min-width:4%}.awake{background:#d6dde4}.light{background:#6ea8ff}.deep{background:#3454d1}.rem{background:#9f7aea}.legend{display:flex;flex-wrap:wrap;gap:8px 12px;color:var(--muted);font-size:11px}.zones{display:grid;gap:9px;margin-top:12px}.zone{display:grid;grid-template-columns:62px minmax(0,1fr)42px;align-items:center;gap:8px;color:var(--soft);font-size:12px}.zt{height:7px;border-radius:999px;background:rgba(244,247,248,.1);overflow:hidden}.zf{width:calc(var(--v)*1%);height:100%;background:var(--a)}.curve{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));align-items:end;gap:5px;height:98px;padding:12px 10px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,rgba(255,94,108,.12),transparent 42%),rgba(21,28,35,.68)}.cb{height:calc(var(--v)*1%);min-height:7px;border-radius:999px 999px 2px 2px;background:var(--stress)}.trend{padding:13px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.82);display:grid;gap:12px}.tr{display:grid;grid-template-columns:70px minmax(0,1fr);gap:10px;align-items:center}.spark{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));align-items:end;gap:5px;height:46px}.sb{height:calc(var(--v)*1%);min-height:5px;border-radius:5px 5px 2px 2px;background:currentColor;opacity:.75}.sb.now{opacity:1;outline:1px solid rgba(244,247,248,.5)}.tags{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.tag{min-height:44px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.88);color:var(--soft);text-align:left;padding:10px}.tag.on{border-color:rgba(77,215,255,.62);background:rgba(77,215,255,.1);color:var(--text)}.item{padding:12px}.item+.item{margin-top:9px}.item p{margin:8px 0 0;color:var(--soft);font-size:13px;line-height:1.45}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.kpi{min-height:64px;padding:9px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.78)}.kpi span{display:block;color:var(--muted);font-size:10px}.kpi strong{display:block;margin-top:7px;font-size:17px}.prompt{width:100%;min-height:42px;border:1px solid var(--line);border-radius:8px;background:rgba(21,28,35,.78);text-align:left;padding:10px 12px}.msg{padding:12px}.msg.a{border-color:rgba(77,215,255,.22);background:rgba(77,215,255,.08)}.role{color:var(--muted);font-size:11px;margin-bottom:6px}.mc{color:var(--soft);font-size:13px;line-height:1.5;white-space:pre-line}.ask{display:grid;grid-template-columns:minmax(0,1fr)76px;gap:8px}.ask input{min-width:0;min-height:42px;border:1px solid var(--line);border-radius:8px;background:rgba(16,22,28,.9);color:var(--text);padding:0 11px}.ask button{border:0;border-radius:8px;background:var(--coach);color:#061017;font-weight:760}.dev{padding:13px}.devgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.stat{min-height:76px;padding:11px;border:1px solid var(--line);border-radius:8px;background:rgba(21,28,35,.72)}.stat span{display:block;color:var(--muted);font-size:11px}.stat strong{display:block;margin-top:8px;font-size:18px}.set{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:52px;border-top:1px solid var(--line)}.set:first-child{border-top:0}.set small{display:block;margin-top:3px;color:var(--muted);font-size:11px}.sw{width:46px;height:26px;border:1px solid var(--line);border-radius:999px;background:rgba(244,247,248,.12);position:relative}.sw:after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--soft)}.sw.on{background:rgba(67,244,197,.18);border-color:rgba(67,244,197,.42)}.sw.on:after{transform:translateX(20px);background:#43f4c5}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,460px);display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;padding:8px 10px 12px;border-top:1px solid var(--line);background:rgba(7,10,13,.94);backdrop-filter:blur(14px)}.nav button{min-width:0;min-height:48px;border:0;border-radius:8px;background:transparent;color:var(--muted);font-size:11px;font-weight:680}.nav button.on{background:rgba(244,247,248,.08);color:var(--text)}@media(max-width:360px){.content{padding-left:12px;padding-right:12px}.big{font-size:50px}.timeline,.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.tags{grid-template-columns:1fr}}</style></head><body><div id="app"></div><script>const days=[{date:'2026-06-08',label:'睡得好，HRV高',r:86,s:91,n:28,n21:5.9,x:24,rec:'push',light:'green',hrv:76,rhr:52,sleep:'8h 25m',need:'8h 00m',load:22,j:['无酒精','早睡','节律稳定'],reasons:['HRV 76ms，比个人基线高 +23%。','RHR 52 bpm，低于基线 4 bpm。','睡眠 8h 25m，已经覆盖个人需求。','Stress 24 较低，今天自主神经负担轻。']},{date:'2026-06-09',label:'饮酒晚睡',r:31,s:48,n:18,n21:3.8,x:71,rec:'recover',light:'blue',hrv:42,rhr:64,sleep:'5h 15m',need:'8h 00m',load:13,j:['饮酒','晚睡','压力事件'],reasons:['Journal 记录 3 杯饮酒，叠加晚睡 140 分钟。','HRV 42ms，比个人基线低 32%。','RHR 64 bpm，高于基线 8 bpm。','睡眠 5h 15m，距离需求还差 2h 45m。']},{date:'2026-06-10',label:'工作高压日',r:58,s:76,n:35,n21:7.4,x:82,rec:'recover',light:'red',hrv:57,rhr:58,sleep:'7h 20m',need:'8h 00m',load:28,j:['咖啡','轻活动','压力事件'],reasons:['压力事件等级 3，全天 Stress 已进入高压区间。','Stress 82 偏高，下午需要主动降档。','睡眠 7h 20m，距离需求还差 0h 40m。','RHR 58 bpm，高于基线 2 bpm。']},{date:'2026-06-11',label:'昨天重训后',r:49,s:72,n:84,n21:17.6,x:52,rec:'maintain',light:'yellow',hrv:54,rhr:60,sleep:'7h 10m',need:'8h 00m',load:118,j:['训练','晚睡'],reasons:['昨日高负荷 activityLoad 118，身体还在消化训练刺激。','HRV 54ms，比个人基线低 13%。','RHR 60 bpm，高于基线 4 bpm。','睡眠 7h 10m，距离需求还差 0h 50m。']},{date:'2026-06-12',label:'咖啡晚睡短睡',r:39,s:55,n:22,n21:4.6,x:63,rec:'recover',light:'blue',hrv:48,rhr:62,sleep:'6h 00m',need:'8h 00m',load:16,j:['咖啡','晚睡','压力事件'],reasons:['下午咖啡 2 杯，晚睡 110 分钟，睡眠连续性变差。','HRV 48ms，比个人基线低 23%。','RHR 62 bpm，高于基线 6 bpm。','睡眠 6h 00m，距离需求还差 2h 00m。']}];const nav=['Today','Metrics','Journal','Coach','Device'];let st={p:'Today',d:4,t:'Recovery',tags:{},light:true,dnd:true,bri:44,chat:[]};const $=s=>document.querySelector(s),fmt=d=>d.date.slice(5).replace('-','/'),mode=d=>({push:'冲',maintain:'稳住',recover:'恢复'}[d.rec]),target=d=>d.rec==='push'?'10-12':d.rec==='maintain'?'8-11':'4-7',adv=d=>d.rec==='push'?`今天适合冲：Recovery ${d.r}、Sleep ${d.s}，可以做中等偏高训练，目标 Strain 10-12。`:d.rec==='maintain'?`今天稳住：昨日负荷高，当前 Strain ${d.n21}/21，训练控制在中等强度。`:d.x>=80?`今天优先恢复：Stress ${d.x} 已偏高，训练降到 Zone 2 以内，先把压力拉下来。`:d.s<60?'今天优先恢复：睡眠不足拉低状态，白天轻活动，今晚提前进入 wind-down。':`今天优先恢复：Recovery ${d.r} 偏低，避免冲 PR。`;function top(d){return `<header class='top'><div><p class='ey'>${fmt(d)} · ${d.label}</p><h1>Hi, David</h1></div><div class='chip'><i class='dot ${st.light?d.light:'grey'}'></i><span>Band ${[82,64,58,73,76][st.d]}% · 刚刚同步</span></div></header><div class='scenes'>${days.map((x,i)=>`<button class='scene ${i===st.d?'on':''}' data-day='${i}'><span class='date'>${fmt(x)}</span><span class='name'>${x.label}</span></button>`).join('')}</div>`}function card(k,v,c,n){return `<article class='card ${c}'><button data-open='${k}'><div class='row'><span class='lab'>${k}</span><span class='lab'>View</span></div><div class='val'>${v}</div><div class='sub'>${n}</div><div class='bar'><div class='fill' style='--v:${String(v).replace(/[^0-9.]/g,'')}'></div></div></button></article>`}function today(d){return `<section class='hero ${d.rec}'><div class='heroTop'><div><div class='lab'>Recovery</div><div class='big'>${d.r}<span>%</span></div></div><div class='right'><span class='pill ${d.rec}'>${mode(d)}</span><p class='sub'>Sleep ${d.s} · Strain ${d.n21}/21 · Stress ${d.x}</p></div></div><p class='copy'>${adv(d)}</p><p class='sub'>呼吸灯：${st.light?({green:'绿色 · 快节奏',yellow:'黄色 · 中节奏',blue:'蓝色 · 慢呼吸',red:'红色 · 短脉冲'}[d.light]):'关闭'} · 佩戴正常</p></section><section class='grid'>${card('Recovery',d.r+'%','rec','Ready')}${card('Sleep',d.s+'%','sleep',d.sleep+' / Need '+d.need)}${card('Strain',d.n21,'strain','Target '+target(d)+' / 21')}${card('Stress',d.x,'stress',d.x>=80?'High':d.x>55?'Medium':'Low')}</section><section class='sec'><div class='head'><h2>Top reasons</h2><span class='meta'>Confidence 86%</span></div><div class='reasons'>${d.reasons.map((r,i)=>`<div class='reason'><span class='idx'>${i+1}</span><span class='txt'>${r}</span></div>`).join('')}</div></section><section class='sec'><div class='head'><h2>Today timeline</h2><span class='meta'>Updated 08:42</span></div><div class='timeline'>${['Sleep '+d.s,'Recovery '+d.r,d.x>=80?'Downshift':'Workout window','22:35 wind-down'].map((x,i)=>`<div class='step'><span class='time'>${['07:08','08:10','14:00','22:35'][i]}</span><b>${x}</b></div>`).join('')}</div></section><section class='sec ins'><b>Coach Insight</b><p>${d.rec==='push'?'HRV 高于基线，RHR 更低，今天可做受控训练；若下午压力升高，把强度降回 Zone 2。':d.j.includes('饮酒')?'饮酒和晚睡共同压低 Recovery。今天不要用高强度训练硬顶，优先补水、轻活动和提前入睡。':d.x>=80?'恢复不算最低，但压力已高。今天的关键不是加练，而是减少会议后持续高唤醒。':d.load>90?'昨天训练负荷很高，今天保持移动即可。把 Strain 控制在 '+target(d)+'，让恢复跟上。':'短睡和晚咖啡让睡眠恢复不足。今天保持低负荷，下午 14:00 后停止咖啡因。'}</p></section>`}function metrics(d){return `<section class='tabs'>${['Recovery','Sleep','Strain','Stress'].map(x=>`<button class='tab ${st.t===x?'on':''}' data-tab='${x}'>${x}</button>`).join('')}</section>${detail(d)}<section class='sec'><div class='head'><h2>7-day trends</h2><span class='meta'>当前日期高亮</span></div><div class='trend'>${trendRows()}</div></section>`}function tile(a,b,c){return `<div class='tile'><span class='lab'>${a}</span><strong>${b}</strong><small>${c}</small></div>`}function detail(d){if(st.t==='Sleep')return `<section class='metric sleep' style='--a:var(--sleep)'><div class='metricHead'><div><h2>Sleep ${d.s}%</h2><p class='sub'>${d.sleep} / Need ${d.need}</p></div><div class='ring' style='--v:${d.s}'><strong>${d.s}</strong></div></div><div class='stage'><i class='sg awake' style='width:8%'></i><i class='sg light' style='width:55%'></i><i class='sg deep' style='width:19%'></i><i class='sg rem' style='width:18%'></i></div><div class='legend'><span>Awake</span><span>Light</span><span>Deep</span><span>REM</span></div><div class='tiles'>${tile('Efficiency',d.s>70?'91%':'78%','sleep continuity')}${tile('Latency',d.s<60?'28m':'14m','time to sleep')}${tile('Deep sleep',d.s>70?'1h 32m':'0h 52m','recovery depth')}${tile('Tonight',d.s<60?'23:00 前入睡':'23:10 前入睡','sleep plan')}</div></section>`;if(st.t==='Strain')return `<section class='metric strain' style='--a:var(--strain)'><div class='metricHead'><div><h2>Strain ${d.n21} / 21</h2><p class='sub'>Target ${target(d)} / 21 · Recovery ${d.r}% 决定今天的负荷上限。</p></div><div class='ring' style='--v:${Math.round(d.n21/21*100)}'><strong>${d.n21}</strong></div></div><div class='zones'>${[28,42,22,12].map((z,i)=>`<div class='zone'><span>Zone ${i+1}</span><div class='zt'><div class='zf' style='--v:${Math.min(100,z+d.n/3)}'></div></div><span>${Math.round((z+d.n/5)/2)}m</span></div>`).join('')}</div><div class='tiles'>${tile('Activity load',d.load,'0-120 demo scale')}${tile('Peak HR',d.load>90?'184 bpm':'132 bpm','today max')}${tile('Next move',d.rec==='push'?'45m Zone 2':d.rec==='maintain'?'30m easy':'walk + stretch','training decision')}${tile('Avoid',d.x>=80?'HIIT':d.s<60?'PR attempt':'extra intervals','overload guardrail')}</div></section>`;if(st.t==='Stress')return `<section class='metric stress' style='--a:var(--stress)'><div class='metricHead'><div><h2>Stress ${d.x}</h2><p class='sub'>${d.x>=80?'High':d.x>55?'Medium':'Low'} · 当前压力趋势</p></div><div class='ring' style='--v:${d.x}'><strong>${d.x}</strong></div></div><div class='curve'>${[.42,.34,.38,.48,.56,.62,.8,.72,.66,.58,.5,.44].map(v=>`<i class='cb' style='--v:${Math.min(100,Math.round(d.x*v+(d.x>=80?12:0)))}'></i>`).join('')}</div><div class='tiles'>${tile('Last spike',d.x>=80?'14:20':'16:40',d.x>=80?'meeting 18m':'short spike')}${tile('Likely driver',d.x>=80?'work pressure':d.j.includes('饮酒')?'alcohol + sleep':d.j.includes('咖啡')?'late caffeine':'low load','from Journal + HR')}${tile('Intervention','2min downshift','breathing or walk')}${tile('Tonight',d.s<60?'23:00 前入睡':'23:10 前入睡','reduce sleep pressure')}</div></section>`;return `<section class='metric rec' style='--a:var(--rec)'><div class='metricHead'><div><h2>Recovery ${d.r}%</h2><p class='sub'>${adv(d)}</p></div><div class='ring' style='--v:${d.r}'><strong>${d.r}</strong></div></div><div class='tiles'>${tile('HRV',d.hrv+' ms','vs baseline')}${tile('RHR',d.rhr+' bpm','resting heart rate')}${tile('Respiration',d.x>=70?'15.9/min':'14.8/min','baseline aware')}${tile('Skin temp',d.j.includes('饮酒')?'+0.6C':'normal','relative to baseline')}</div></section>`}function trendRows(){const base=[{r:68,s:78,n:36,x:34},{r:73,s:81,n:42,x:31},...days];return [['Recovery','r','rec'],['Sleep','s','sleep'],['Strain','n','strain'],['Stress','x','stress']].map(a=>`<div class='tr ${a[2]}'><span class='lab'>${a[0]}</span><div class='spark'>${base.map((b,i)=>`<i class='sb ${i===st.d+2?'now':''}' style='--v:${b[a[1]]}'></i>`).join('')}</div></div>`).join('')}function journal(d){const all=['饮酒','咖啡','晚睡','训练','轻活动','压力事件','午睡','拉伸'];const key=d.date;if(!st.tags[key])st.tags[key]=[...d.j];return `<section><div class='head'><h2>Today Journal</h2><span class='meta'>${st.tags[key].length} selected</span></div><div class='tags'>${all.map(x=>`<button class='tag ${st.tags[key].includes(x)?'on':''}' data-tag='${x}'>${x}</button>`).join('')}</div></section><section class='sec'><div class='head'><h2>Morning check-in</h2><span class='meta'>Energy ${Math.max(1,Math.round(d.r/22))}/5</span></div><div class='item'><b>Energy</b><p>${d.rec==='push'?'主观能量充足，适合把重要训练或深度工作放在上午。':d.x>=80?'不是彻底没电，但压力占用恢复空间，下午要主动降档。':'能量偏低，今天不要用高刺激硬拉状态。'}</p></div><div class='item'><b>Soreness</b><p>${d.load>90?'昨天重训后酸痛更明显，今天不叠加高强度间歇。':d.j.includes('饮酒')?'酸痛不是主因，饮酒和短睡更可能解释恢复下降。':'酸痛可控，主要看睡眠和压力是否拉回正常区间。'}</p></div></section><section class='sec ins'><b>Correlation</b><p>${st.tags[key].includes('饮酒')?d.j.includes('饮酒')?'饮酒 + 晚睡通常会同时压低 HRV、抬高 RHR，本日 Recovery 已降到低位。':'已记录饮酒，明早重点观察 HRV、RHR 和深睡是否被拉低。':st.tags[key].includes('咖啡')&&st.tags[key].includes('晚睡')?'下午咖啡与晚睡叠加，睡眠债扩大，今晚应提前停止咖啡因。':st.tags[key].includes('压力事件')?'压力事件会推高白天 Stress，即使 Sleep 尚可，训练建议也会被降级。':'当前日志偏干净，恢复变化主要来自 HRV、RHR 和睡眠达成度。'}</p></section>`}function coach(d){if(!st.chat.length)st.chat=[['Coach',`今天是 ${mode(d)} 状态。${adv(d)}`]];const qs=['今天能练吗？','为什么恢复低？','今晚该几点睡？','压力为什么高？','饮酒/晚睡影响了什么？','过去 7 天趋势怎么看？'];return `<section class='kpis'>${[['Recovery',d.r,'rec'],['Sleep',d.s,'sleep'],['Strain',d.n21,'strain'],['Stress',d.x,'stress']].map(k=>`<div class='kpi ${k[2]}'><span>${k[0]}</span><strong>${k[1]}</strong></div>`).join('')}</section><section class='sec'><div class='head'><h2>Suggested prompts</h2></div><div class='list'>${qs.map(q=>`<button class='prompt' data-q='${q}'>${q}</button>`).join('')}</div></section><section class='sec'><div class='head'><h2>Chat</h2><span class='meta'>Data-backed</span></div><div class='list'>${st.chat.map(m=>`<div class='msg ${m[0]==='Coach'?'a':''}'><div class='role'>${m[0]}</div><div class='mc'>${m[1]}</div></div>`).join('')}</div></section><section class='sec'><form class='ask'><input placeholder='问今天训练、睡眠或恢复'><button>Ask</button></form></section>`}function answer(q,d){if(q.includes('练'))return d.rec==='push'?`可以练，但要受控。\n依据：Recovery ${d.r}、Sleep ${d.s}，Stress ${d.x} 不高。\n行动：1. 45min Zone 2；2. 力量训练不冲极限；3. Strain 到 12 附近收。`:d.rec==='maintain'?`能练，但不适合冲。\n依据：Strain 已到 ${d.n21}/21，Recovery ${d.r} 只是中低位。\n行动：1. 30min easy；2. 不做高强度间歇；3. 睡前拉伸 10min。`:`今天不建议冲训练。\n依据：Recovery ${d.r}、Sleep ${d.s}、Stress ${d.x}。\n行动：1. 散步或拉伸；2. 训练控制在 Zone 2；3. 今晚提前入睡。`;if(q.includes('睡'))return `今晚建议：${d.s<60?'22:35 开始收尾，23:00 前入睡':'23:10 前入睡，保持节律'}。\n依据：昨晚睡了 ${d.sleep}，睡眠需求 ${d.need}。\n行动：降低光照、不加咖啡因、明早看 HRV 是否回升。`;if(q.includes('压力'))return `Stress 当前是 ${d.x}。主要驱动更像是 ${d.x>=80?'work pressure':d.j.includes('咖啡')?'late caffeine':'sleep/load'}。\n行动：2min downshift breathing，晚上训练不追强度，睡前 1h 不处理工作消息。`;if(q.includes('饮酒'))return d.j.includes('饮酒')?`本日记录饮酒 + 晚睡。\n可能影响：HRV ${d.hrv}ms，RHR ${d.rhr} bpm，Sleep ${d.s}。\n行动：今天轻活动、补水、提前睡。`:`今天没有饮酒记录。恢复变化更应看睡眠达成、压力和训练负荷。`;if(q.includes('趋势'))return `7 天趋势里，当前高亮日期是 ${fmt(d)}。Recovery ${d.r}、Sleep ${d.s}、Strain ${d.n}、Stress ${d.x}。连续两天 Recovery 低于 45 就先恢复。`;return `恢复变化主要来自：${d.reasons.slice(0,2).join(' ')}\n今天结论是 ${mode(d)}，把 HRV、RHR、睡眠和 Journal 放在一起看。`}function device(d){return `<section class='dev'><div class='head'><h2>Band status</h2><span class='meta'><i class='dot ${st.light?d.light:'grey'}'></i></span></div><div class='devgrid'>${[['Battery',[82,64,58,73,76][st.d]+'%'],['Sync','刚刚同步'],['Wear','佩戴正常'],['Firmware','1.2.8']].map(x=>`<div class='stat'><span>${x[0]}</span><strong>${x[1]}</strong><span>normal</span></div>`).join('')}</div></section><section class='sec dev'>${[['呼吸灯','light',st.light],['勿扰','dnd',st.dnd]].map(x=>`<div class='set'><div><b>${x[0]}</b><small>${x[1]==='light'?(st.light?d.light+' · 跟随今日建议':'关闭'):'23:00-07:00'}</small></div><button class='sw ${x[2]?'on':''}' data-set='${x[1]}'></button></div>`).join('')}<div class='set'><div><b>亮度</b><small>${st.bri}%</small></div><input type='range' min='12' max='100' value='${st.bri}' data-bri></div></section><section class='sec ins'><b>Light state</b><p>当前跟随今日建议：${mode(d)}。设备只用小状态点反馈连接、同步、高压力和恢复节奏。</p></section>`}function render(){const d=days[st.d];$('#app').innerHTML=`<main class='app'><section class='content'>${top(d)}${st.p==='Today'?today(d):st.p==='Metrics'?metrics(d):st.p==='Journal'?journal(d):st.p==='Coach'?coach(d):device(d)}</section><nav class='nav'>${nav.map(n=>`<button class='${st.p===n?'on':''}' data-nav='${n}'>${n}</button>`).join('')}</nav></main>`}document.addEventListener('click',e=>{const d=days[st.d];let x=e.target.closest('[data-day],[data-nav],[data-open],[data-tab],[data-tag],[data-q],[data-set]');if(!x)return;if(x.dataset.day){st.d=+x.dataset.day;st.chat=[]}if(x.dataset.nav)st.p=x.dataset.nav;if(x.dataset.open){st.p='Metrics';st.t=x.dataset.open}if(x.dataset.tab)st.t=x.dataset.tab;if(x.dataset.tag){let k=d.date;if(!st.tags[k])st.tags[k]=[...d.j];st.tags[k]=st.tags[k].includes(x.dataset.tag)?st.tags[k].filter(v=>v!==x.dataset.tag):[...st.tags[k],x.dataset.tag]}if(x.dataset.q){st.chat.push(['You',x.dataset.q],['Coach',answer(x.dataset.q,d)])}if(x.dataset.set)st[x.dataset.set]=!st[x.dataset.set];render()});document.addEventListener('submit',e=>{if(e.target.className==='ask'){e.preventDefault();let v=e.target.querySelector('input').value.trim();if(v){st.chat.push(['You',v],['Coach',answer(v,days[st.d])]);render()}}});document.addEventListener('input',e=>{if(e.target.dataset.bri){st.bri=e.target.value;render()}});render();</script></body></html>
